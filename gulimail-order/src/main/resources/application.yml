spring:
  session:
    store-type: redis
  datasource:
    username: root
    password: root
    url: jdbc:mysql://192.168.10.101:3306/gulimail_oms?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
  rabbitmq:
    host: 192.168.10.101
    port: 5672
    virtual-host: /
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
              acknowledge-mode: manual
  thymeleaf:
    mode: HTML
    cache: false
    check-template-location: true
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/resources
  data:
    redis:
      host: 192.168.10.101
      port: 6379
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
server:
  port: 9000
management:
  zipkin:
    tracing:
      # 错误写法：http://localhost:9411/api/v2/spans
      # 正确写法：改成你 Linux 服务器的真实 IP
      endpoint: http://192.168.10.101:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0  # 确保 100% 采样，方便调试