spring:
  application:
    name: gulimail-product
  # 【核心修正】必须紧跟在 application 后面，且格式严格
  config:
    import:
      - nacos:gulimail-product.yaml?server-addr=127.0.0.1:8848&namespace=3531d4a7-97cf-4b4e-bfc1-fe4eec5f2f4e&refreshEnabled=true

  datasource:
    username: root
    password: root
    url: jdbc:mysql://192.168.10.101:3306/gulimail_pms?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        file-extension: yml
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 5000

  thymeleaf:
    cache: false
    prefix: classpath:/templates/

  session:
    store-type: redis

  data:
    redis:
      host: 192.168.10.101
      port: 6379
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      use-key-prefix: true
      cache-null-values: true

  mvc:
    throw-exception-if-no-handler-found: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 10000

logging:
  level:
    com.lg.gulimail: debug

gulimail:
  thread:
    core-size: 20
    max-size: 200
    keep-alive-time: 10

management:
  zipkin:
    tracing:
      endpoint: http://192.168.10.101:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0