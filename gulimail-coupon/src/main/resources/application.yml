spring:
  application:
    name: gulimail-coupon
  datasource:
    username: root
    password: root
    url: jdbc:mysql://192.168.10.101:3306/gulimail_sms?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
  config:
    import:
      - optional:nacos:gulimail-coupon.yaml

  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:8848
      discovery:
        server-addr: 127.0.0.1:8848
        client-rpc-transport-enable: false
  rabbitmq:
    host: 192.168.10.101  # 服务器 IP
    port: 5672

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
management:
  zipkin:
    tracing:
      # 把 localhost 改成你 Linux 服务器的 IP 地址
      endpoint: http://192.168.10.101:9411/api/v2/spans
server:
  port: 7000
