spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  rabbitmq:
    host: 192.168.10.101
    port: 5672
    virtual-host: /
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8333
        port: 8719
      datasource:
        ds1:
          nacos:
            server-addr: 127.0.0.1:8848
            dataId: gulimail-seckill-sentinel-flow
            groupId: DEFAULT_GROUP
            data-type: json
            rule-type: flow
feign:
  sentinel:
    enabled: true
management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  zipkin:
    tracing:
      # 错误写法：http://localhost:9411/api/v2/spans
      # 正确写法：改成你 Linux 服务器的真实 IP
      endpoint: http://192.168.10.101:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0  # 确保 100% 采样，方便调试
xxl:
  job:
    admin:
      addresses: http://192.168.10.101:8080/xxl-job-admin
    accessToken: default_token
    executor:
      appname: gulimail-seckill-executor
      port: 9997
      logpath: ./logs/xxl-job/gulimail-seckill
      logretentiondays: 30
