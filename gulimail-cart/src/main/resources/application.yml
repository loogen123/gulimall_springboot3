spring:
  application:
    name: gulimail-cart
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
  data:
    redis:
          host: 192.168.10.101
          port: 6379
  rabbitmq:
    host: 192.168.10.101
    port: 5672
server:
  port: 31000
management:
  zipkin:
    tracing:
      # 错误写法：http://localhost:9411/api/v2/spans
      # 正确写法：改成你 Linux 服务器的真实 IP
      endpoint: http://192.168.10.101:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0  # 确保 100% 采样，方便调试